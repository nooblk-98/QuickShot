<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QuickShot</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <div class="menu">

    <button id="btn-area" class="menu-btn">
      <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      CAPTURE SELECTED AREA
    </button>

    <button id="btn-visible" class="menu-btn">
      <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      CAPTURE VISIBLE AREA
    </button>

    <button id="btn-fullpage" class="menu-btn">
      <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="18" rx="2"/>
        <line x1="2" y1="8" x2="22" y2="8"/>
      </svg>
      CAPTURE FULL PAGE
    </button>

  </div>

  <div class="radius-section">
    <div class="radius-header">
      <span class="radius-label">Rounded Corners</span>
      <span class="radius-value-wrap"><span id="radius-value">0</span>px</span>
    </div>
    <input type="range" id="corner-radius" class="radius-slider" min="0" max="60" value="0" step="1" />
  </div>

  <div class="options-section">
    <label class="option-checkbox">
      <input type="checkbox" id="remember-area" />
      <span class="checkbox-label">Remember last selected area</span>
    </label>
  </div>

  <div class="status-area">
    <div id="status" class="status"></div>
  </div>

  <div class="footer">
    Developed by <a class="footer-link" href="https://github.com/nooblk-98/QuickShot" target="_blank">nooblk</a>
    &nbsp;·&nbsp;
    <a class="footer-link kofi" href="https://ko-fi.com/nooblk98" target="_blank">☕ Support</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
