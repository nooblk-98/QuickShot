name: Release Extension

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'manifest.json'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from manifest.json
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "VERSION=v${VERSION}" >> $GITHUB_OUTPUT
          echo "RAW_VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build extension zip
        run: |
          zip -r quickshot-${{ steps.version.outputs.VERSION }}.zip \
            manifest.json \
            src/ \
            logo.png \
            --exclude "*.DS_Store"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: QuickShot ${{ steps.version.outputs.VERSION }}
          body: |
            ## QuickShot ${{ steps.version.outputs.VERSION }}

            ### Install from Chrome Web Store
            Coming soon on the Chrome Web Store.

            ### Manual Install (Developer Mode)
            1. Download `quickshot-${{ steps.version.outputs.VERSION }}.zip` below
            2. Unzip the folder
            3. Open `chrome://extensions` and enable Developer mode
            4. Click Load unpacked and select the unzipped folder

            ### Whats new
            See commit history for changes in this release.
          files: quickshot-${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
